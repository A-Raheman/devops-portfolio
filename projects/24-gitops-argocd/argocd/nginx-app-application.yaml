apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-nginx-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/A-Raheman/devops-portfolio.git
    targetRevision: main
    path: projects/24-gitops-argocd/manifests/nginx-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

