apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-nginx
spec:
  replicas: 1
  selector:
    matchLables:
      app: insecure-nginx
  template:
    metadata:
      labels:
        app: insecure-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        securityContext:
          privileged: true
        ports:
        - containerPort: 80

