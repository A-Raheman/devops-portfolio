apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaling-nginx
  namespace: autoscaling-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaling-nginx
  template:
    metadata:
      labels:
        app: autoscaling-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - containerPort: 80
