apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-app
  template:
    metadata:
      labels:
        app: monitoring-app
    spec:
      containers:
        - name: monitoring-app
          image: monitoring-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
