apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
      - name: log-generator
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo "INFO: Application healthy";
            echo "WARNING: High memory usage detected";
            echo "ERROR: Database connection timeout";
            sleep 5;
          done

