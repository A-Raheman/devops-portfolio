alloy:
  configMap:
    create: true
    content: |-
      loki.write "local" {
        endpoint {
          url = "http://loki-service.default.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.local.receiver]
      }

controller:
  type: daemonset
